hule einen Minijob aufgestockt und plötzlich tauchen Abzüge auf der Abrechnung auf, die vorher nicht da waren. Sie fragen sich, ob sich die zusätzlichen Stunden überhaupt noch lohnen."},{id:"gesellschaft",label:"gesellschaftlich",situation:"In einer Talkshow streiten zwei Gäste: Der eine sagt, Mehrarbeit lohne sich in Deutschland „kaum noch“, weil der Staat alles wegnehme. Der andere widerspricht. Wer hat recht – und woran lässt sich das überhaupt festmachen?"}]},diagnose:{vorwissen:[{id:"v1",frage:"Auf der Gehaltsabrechnung steht ganz oben der „Bruttolohn“. Was ist damit gemeint?",optionen:[{text:"Der vereinbarte Lohn, bevor Steuern und Abgaben abgezogen werden.",score:2},{text:"Der Betrag, der am Monatsende auf dem Konto ankommt.",score:0},{text:"Der Lohn nach Abzug der Steuer, aber vor den Sozialabgaben.",score:0}]},{id:"v2",frage:"Zwischen Bruttolohn und Nettolohn liegen Abzüge. Welche Aussage trifft am ehesten zu?",optionen:[{text:"Abgezogen werden Lohnsteuer und Sozialversicherungsbeiträge (Kranken-, Renten-, Pflege- und Arbeitslosenversicherung).",score:2},{text:"Abgezogen wird ausschließlich die Lohnsteuer.",score:1},{text:"Es werden nur Sozialabgaben abgezogen; die Steuer übernimmt der Arbeitgeber.",score:0}]},{id:"v3",frage:"Jemand verdient durch eine Gehaltserhöhung mehr und kommt in einen höheren Steuersatz. Wie wirkt dieser höhere Satz?",optionen:[{text:"Er gilt nur für den zusätzlich verdienten Teil des Einkommens.",score:2},{text:"Er gilt rückwirkend für das gesamte Einkommen.",score:1},{text:"Die Steuer steigt dadurch jedes Jahr automatisch weiter an.",score:0}]}],praekonzepte:[{id:"p1",typ:"skala",aussage:"Wer durch eine Gehaltserhöhung in einen höheren Steuersatz kommt, hat am Ende netto weniger als vorher.",skala:{stufen:5,minLabel:"stimme gar nicht zu",maxLabel:"stimme voll zu"},fehlvorstellungAbStufe:4,triggert:"konfrontation_p1"},{id:"p2",typ:"offen",frage:"Begründen Sie kurz: Warum schätzen Sie das so ein?",platzhalter:"Was geht Ihnen dazu durch den Kopf?"}],motivation:[{id:"m1",typ:"skala",frage:"Wie interessant finden Sie das Thema „Lohn und Steuern“ für sich persönlich?",skala:{stufen:5,minLabel:"gar nicht interessant",maxLabel:"sehr interessant"}},{id:"m2",typ:"offen",frage:"Wofür könnte das Thema in Ihrem (Berufs-)Alltag einmal wichtig werden?",platzhalter:"Beschreiben Sie kurz eine Situation."},{id:"m3",typ:"offen",frage:"Was müsste passieren, damit Sie das Thema besonders spannend finden?",platzhalter:"Ihre Idee …"}]},konfrontationsbausteine:[{id:"konfrontation_p1",titel:"Kurzer Check: Lohnt sich mehr Brutto wirklich nicht?",inhalt:`Ein verbreiteter Gedanke ist: „Bei mehr Gehalt rutsche ich in eine höhere Steuer und habe netto weniger.“ Rechnen wir gegen:
