document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" style-hover=\"color:#04121b;background:#9fd0d8;border-color:#9fd0d8;\">Lehrkraft<\u002Fbutton>\n  <\u002Fheader>\n\n  <!-- ============ SCREENS ============ -->\n  <div style=\"position:relative;z-index:10;\">\n\n    <!-- ===== HOME ===== -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <!-- Panel 1: hero -->\n      <section style=\"position:relative;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px;scroll-snap-align:start;\">\n        <h1 style=\"animation:ap-rise 1.1s ease 0.1s both;margin:0;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(54px,11vw,128px);line-height:0.95;color:#f1fafb;letter-spacing:-1px;text-shadow:0 8px 40px rgba(0,0,0,0.4);\">Ankerpunkt<\u002Fh1>\n        <div style=\"position:absolute;bottom:48px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:#7fc0cb;animation:ap-scrollhint 2.2s ease-in-out infinite;\">\n          <span style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;\">Scrollen<\u002Fspan>\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><path d=\"M4 7l5 5 5-5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Panel 2: entry -->\n      <section style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 24px 80px;scroll-snap-align:start;\">\n        <div style=\"max-width:1040px;width:100%;\">\n          <h2 style=\"text-align:center;margin:0 auto 40px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,6vw,56px);line-height:1.05;color:#f1fafb;\">Willkommen an Bord<\u002Fh2>\n\n          <div style=\"max-width:560px;margin:0 auto;\">\n            <!-- student card -->\n            <div style=\"position:relative;padding:38px 36px;border-radius:20px;background:linear-gradient(160deg,rgba(13,52,66,0.66),rgba(7,34,46,0.78));border:1px solid rgba(120,190,205,0.22);backdrop-filter:blur(14px);box-shadow:0 24px 60px -24px rgba(0,0,0,0.6);\">\n              <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#f0b955;margin-bottom:14px;\">Für Schülerinnen &amp; Schüler<\u002Fdiv>\n              <p style=\"margin:0 0 22px;font-size:15px;line-height:1.6;color:#bcdce2;\">Geben Sie den Sitzungs-Code Ihrer Lehrkraft ein. Keine Anmeldung, kein Klarname nötig.<\u002Fp>\n              <form onsubmit=\"{{ submitCode }}\" style=\"display:flex;flex-direction:column;gap:12px;\">\n                <label style=\"font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#7fb2bd;\">Sitzungs-Code<\u002Flabel>\n                <div style=\"display:flex;gap:10px;\">\n                  <input value=\"{{ code }}\" oninput=\"{{ onCodeInput }}\" placeholder=\"z. B. SEMINAR\" maxlength=\"12\" style=\"flex:1;min-width:0;font-family:'Hanken Grotesk',sans-serif;font-size:18px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#eef9fa;background:rgba(3,18,26,0.6);border:1.5px solid rgba(120,190,205,0.3);border-radius:12px;padding:14px 16px;outline:none;\">\n                  <button type=\"submit\" style=\"flex:none;font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:700;color:#04121b;background:#f0b955;border:none;border-radius:12px;padding:0 24px;cursor:pointer;transition:transform 0.2s,background 0.2s;\" style-hover=\"background:#f6c873;transform:translateY(-1px);\">Starten<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-if value=\"{{ codeErr }}\" hint-placeholder-val=\"\">\n                  <div style=\"font-size:13px;color:#ff9e8a;\">{{ codeErr }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"font-size:13px;color:#7fb2bd;\">Tipp: Für die Demo den Code <strong style=\"color:#bcdce2;letter-spacing:1px;\">SEMINAR<\u002Fstrong> verwenden.<\u002Fdiv>\n              <\u002Fform>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"text-align:center;margin-top:54px;font-size:12px;letter-spacing:1px;color:#5f8e98;\">Ankerpunkt · diagnose-basierte Adaptivität · Datenschutz · Impressum<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== STUDENT INTRO ===== -->\n    <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"\">\n      <section style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 24px 80px;\">\n        <div style=\"max-width:620px;width:100%;text-align:center;animation:ap-rise 0.7s ease both;\">\n          <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#f0b955;margin-bottom:14px;\">Sitzung SEMINAR<\u002Fdiv>\n          <h2 style=\"margin:0 0 8px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(36px,6vw,56px);line-height:1.05;color:#f1fafb;\">Eingangsdiagnostik: Wo steht die Gruppe?<\u002Fh2>\n          <div style=\"display:inline-block;width:46px;height:2px;background:#f0b955;margin:18px 0 26px;\"><\u002Fdiv>\n          <p style=\"margin:0 auto 40px;max-width:520px;font-size:16px;line-height:1.7;color:#bcdce2;\">Sie beantworten gleich einige Fragen zum Thema. Es gibt kein richtig oder falsch und keine Noten – Ihre Antworten helfen Ihrer Lehrkraft, den Unterricht passend vorzubereiten. Die Auswertung erfolgt anonym; Anmeldung oder Namensangabe sind nicht nötig.<\u002Fp>\n          <button onclick=\"{{ startQuiz }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:16px;font-weight:700;color:#04121b;background:#f0b955;border:none;border-radius:999px;padding:15px 38px;cursor:pointer;transition:transform 0.2s,background 0.2s;box-shadow:0 14px 36px -12px rgba(240,185,85,0.6);\" style-hover=\"background:#f6c873;transform:translateY(-2px);\">Los geht’s →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== QUIZ ===== -->\n    <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"\">\n      <section style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:104px 24px 64px;\">\n        <div style=\"max-width:720px;width:100%;\">\n          <!-- progress -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n            <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#f0b955;\">{{ q.kicker }}<\u002Fspan>\n            <span style=\"font-size:13px;color:#7fb2bd;letter-spacing:0.5px;\">Frage {{ qNum }} von {{ total }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"height:4px;border-radius:999px;background:rgba(120,190,205,0.18);overflow:hidden;margin-bottom:30px;\">\n            <div style=\"height:100%;border-radius:999px;background:linear-gradient(90deg,#3ab0c0,#f0b955);width:{{ progress }}%;transition:width 0.45s cubic-bezier(.4,0,.2,1);\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:38px 40px;border-radius:22px;background:linear-gradient(160deg,rgba(13,52,66,0.62),rgba(7,30,42,0.74));border:1px solid rgba(120,190,205,0.2);backdrop-filter:blur(16px);box-shadow:0 30px 70px -30px rgba(0,0,0,0.7);\">\n            <h3 style=\"margin:0 0 8px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(26px,3.6vw,36px);line-height:1.2;color:#f1fafb;\">{{ q.text }}<\u002Fh3>\n\n            <!-- statement for likert -->\n            <sc-if value=\"{{ q.statement }}\" hint-placeholder-val=\"\">\n              <div style=\"margin:18px 0 6px;padding:18px 22px;border-left:3px solid #f0b955;background:rgba(240,185,85,0.07);border-radius:0 12px 12px 0;font-size:16px;line-height:1.55;color:#e7f4f6;font-style:italic;\">{{ q.statement }}<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- CHOICE -->\n            <sc-if value=\"{{ isChoice }}\" hint-placeholder-val=\"\">\n              <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:24px;\">\n                <sc-for list=\"{{ opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ opt.sel }}\" style=\"display:flex;align-items:flex-start;gap:14px;text-align:left;width:100%;padding:16px 18px;border-radius:14px;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.5;transition:all 0.22s;background:{{ opt.bg }};border:{{ opt.border }};color:{{ opt.color }};\">\n                    <span style=\"flex:none;width:22px;height:22px;margin-top:1px;border-radius:50%;border:2px solid {{ opt.dot }};display:flex;align-items:center;justify-content:center;\">{{ opt.tick }}<\u002Fspan>\n                    <span>{{ opt.text }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- RATING (likert / scale) -->\n            <sc-if value=\"{{ isRating }}\" hint-placeholder-val=\"\">\n              <div style=\"margin-top:28px;\">\n                <div style=\"display:flex;gap:10px;justify-content:center;\">\n                  <sc-for list=\"{{ scaleVals }}\" as=\"sv\" hint-placeholder-count=\"5\">\n                    <button onclick=\"{{ sv.sel }}\" style=\"flex:1;max-width:88px;aspect-ratio:1;border-radius:14px;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:20px;font-weight:700;transition:all 0.2s;background:{{ sv.bg }};border:{{ sv.border }};color:{{ sv.color }};\">{{ sv.v }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;margin-top:12px;font-size:12px;letter-spacing:0.5px;color:#7fb2bd;\">\n                  <span>{{ q.low }}<\u002Fspan><span>{{ q.high }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- OPEN -->\n            <sc-if value=\"{{ isOpen }}\" hint-placeholder-val=\"\">\n              <div style=\"margin-top:24px;\">\n                <textarea value=\"{{ openVal }}\" oninput=\"{{ onOpenInput }}\" placeholder=\"{{ q.placeholder }}\" rows=\"4\" style=\"width:100%;resize:vertical;font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.6;color:#eef9fa;background:rgba(3,18,26,0.55);border:1.5px solid rgba(120,190,205,0.28);border-radius:14px;padding:16px 18px;outline:none;\"><\u002Ftextarea>\n                <div style=\"margin-top:8px;font-size:13px;color:#7fb2bd;\">Freiwillig – Sie können auch ohne Antwort weitergehen.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- nav -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:26px;\">\n            <button onclick=\"{{ prev }}\" disabled=\"{{ navPrevDisabled }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:600;color:{{ prevColor }};background:none;border:none;cursor:{{ prevCursor }};padding:8px 4px;\">← Zurück<\u002Fbutton>\n            <button onclick=\"{{ next }}\" disabled=\"{{ nextDisabled }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:700;color:{{ nextTextColor }};background:{{ nextBg }};border:none;border-radius:999px;padding:14px 34px;cursor:{{ nextCursor }};transition:all 0.22s;box-shadow:{{ nextShadow }};\">{{ nextLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== TEACHER LIST ===== -->\n    <sc-if value=\"{{ isTeacher }}\" hint-placeholder-val=\"\">\n      <section style=\"min-height:100vh;padding:118px 24px 80px;display:flex;justify-content:center;\">\n        <div style=\"max-width:860px;width:100%;animation:ap-rise 0.6s ease both;\">\n          <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#6fb6c2;margin-bottom:8px;\">Lehrkraft-Bereich<\u002Fdiv>\n          <h2 style=\"margin:0 0 8px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,5vw,50px);color:#f1fafb;line-height:1.05;\">Ihre Lerneinheiten<\u002Fh2>\n          <p style=\"margin:0 0 36px;font-size:15px;color:#a9cdd4;max-width:520px;line-height:1.6;\">Themen anlegen, Diagnose-Fragen bearbeiten und das anonyme Klassenbild Ihrer Gruppe ansehen.<\u002Fp>\n\n          <div style=\"display:flex;flex-direction:column;gap:18px;\">\n            <!-- topic card -->\n            <div style=\"padding:28px 30px;border-radius:20px;background:linear-gradient(160deg,rgba(13,52,66,0.6),rgba(7,30,42,0.72));border:1px solid rgba(120,190,205,0.2);backdrop-filter:blur(14px);box-shadow:0 24px 56px -28px rgba(0,0,0,0.6);\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;\">\n                <div style=\"flex:1;min-width:240px;\">\n                  <span style=\"display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6fb6c2;background:rgba(111,182,194,0.12);border-radius:6px;padding:4px 9px;margin-bottom:12px;\">Beispiel · eingebaut<\u002Fspan>\n                  <h3 style=\"margin:0 0 6px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;color:#f1fafb;\">Eingangsdiagnostik: Wo steht die Gruppe?<\u002Fh3>\n                  <div style=\"font-size:14px;color:#a9cdd4;line-height:1.5;\">Seminar · Studienreferendariat · 8 Fragen<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right;\">\n                  <div style=\"font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#7fb2bd;margin-bottom:4px;\">Sitzungs-Code<\u002Fdiv>\n                  <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:24px;font-weight:700;letter-spacing:3px;color:#f0b955;\">SEMINAR<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;\">\n                <button onclick=\"{{ goClassboard }}\" style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:700;color:#04121b;background:#f0b955;border:none;border-radius:999px;padding:12px 24px;cursor:pointer;transition:all 0.22s;\" style-hover=\"background:#f6c873;transform:translateY(-1px);\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M2 13V8m4 5V4m4 9V6m4 7V3\" stroke=\"#04121b\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                  Klassenbild\n                <\u002Fbutton>\n                <span style=\"display:inline-flex;align-items:center;font-size:14px;font-weight:500;color:#7fa9b3;border:1px solid rgba(120,190,205,0.2);border-radius:999px;padding:11px 22px;\">Vorschau<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;font-size:14px;font-weight:500;color:#7fa9b3;border:1px solid rgba(120,190,205,0.2);border-radius:999px;padding:11px 22px;\">Duplizieren<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- new topic (placeholder, disabled in demo) -->\n            <div style=\"display:flex;align-items:center;gap:14px;padding:22px 28px;border-radius:20px;border:1.5px dashed rgba(120,190,205,0.28);color:#7fb2bd;font-size:15px;\">\n              <span style=\"font-size:22px;line-height:1;color:#9fd0d8;\">+<\u002Fspan> Neues Thema anlegen <span style=\"font-size:12px;opacity:0.7;\">(in der Demo deaktiviert)<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== CLASSBOARD ===== -->\n    <sc-if value=\"{{ isBoard }}\" hint-placeholder-val=\"\">\n      <section style=\"min-height:100vh;padding:104px 24px 90px;display:flex;justify-content:center;\">\n        <div style=\"max-width:920px;width:100%;animation:ap-rise 0.6s ease both;\">\n          <button onclick=\"{{ goTeacher }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:600;color:#9fd0d8;background:none;border:none;cursor:pointer;padding:0;margin-bottom:18px;\">← Lehrkraft-Bereich<\u002Fbutton>\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:6px;\">\n            <div>\n              <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#f0b955;margin-bottom:6px;\">Diagnose · Klassenbild<\u002Fdiv>\n              <h2 style=\"margin:0;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,4.6vw,46px);color:#f1fafb;line-height:1.05;\">Eingangsdiagnostik: Wo steht die Gruppe?<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;color:#f0b955;\">SEMINAR<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 30px;font-size:13px;color:#7fb2bd;display:flex;align-items:center;gap:8px;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M7 1L2 3v3.5C2 9.5 4.2 12 7 13c2.8-1 5-3.5 5-6.5V3L7 1z\" stroke=\"#7fb2bd\" stroke-width=\"1.3\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n            Anonym &amp; aggregiert: <strong style=\"color:#bcdce2;\">{{ n }} Einreichung(en)<\u002Fstrong>. Keine Namen, keine Einzelzuordnung.\n          <\u002Fp>\n\n          <!-- VORWISSEN -->\n          <div style=\"padding:30px 32px;border-radius:20px;background:linear-gradient(160deg,rgba(13,52,66,0.58),rgba(7,30,42,0.7));border:1px solid rgba(120,190,205,0.2);backdrop-filter:blur(14px);margin-bottom:20px;\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px;\">\n              <h3 style=\"margin:0;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:#eef9fa;\">Vorwissen<\u002Fh3>\n              <span style=\"font-size:14px;color:#a9cdd4;\">Ø <strong style=\"color:#f0b955;font-size:18px;\">{{ avgScore }}<\u002Fstrong> von 6 Punkten<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0 0 22px;font-size:13px;color:#7fb2bd;\">Gruppierung nach erreichtem Vorwissens-Score.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:16px;\">\n              <sc-for list=\"{{ levels }}\" as=\"lvl\" hint-placeholder-count=\"3\">\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;\">\n                    <span style=\"font-size:15px;font-weight:600;color:#e7f4f6;\">{{ lvl.name }} <span style=\"font-size:12px;font-weight:400;color:#7fb2bd;\">· {{ lvl.desc }}<\u002Fspan><\u002Fspan>\n                    <span style=\"font-size:13px;color:#a9cdd4;\">{{ lvl.count }} · {{ lvl.pct }} %<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:12px;border-radius:999px;background:rgba(3,18,26,0.5);overflow:hidden;\">\n                    <div style=\"height:100%;border-radius:999px;background:linear-gradient(90deg,#2c8fa0,#4fd1c5);width:{{ lvl.pct }}%;transition:width 0.6s cubic-bezier(.4,0,.2,1);\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- PRÄ-KONZEPTE -->\n          <div style=\"padding:30px 32px;border-radius:20px;background:linear-gradient(160deg,rgba(13,52,66,0.58),rgba(7,30,42,0.7));border:1px solid rgba(120,190,205,0.2);backdrop-filter:blur(14px);margin-bottom:20px;\">\n            <h3 style=\"margin:0 0 4px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:#eef9fa;\">Prä-Konzepte: Überzeugungen &amp; Fehlvorstellungen<\u002Fh3>\n            <p style=\"margin:0 0 22px;font-size:13px;color:#7fb2bd;\">Persönliche Sichtweisen der Gruppe – kein richtig / falsch. Eine hohe Zustimmung in Fehlvorstellungs-Richtung ist hervorgehoben.<\u002Fp>\n            <div style=\"padding:18px 22px;border-left:3px solid #f0b955;background:rgba(240,185,85,0.07);border-radius:0 12px 12px 0;font-size:15px;line-height:1.55;color:#e7f4f6;font-style:italic;margin-bottom:20px;\">{{ statement }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:18px;\">\n              <div style=\"flex:none;text-align:center;\">\n                <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:38px;font-weight:700;color:#f0b955;line-height:1;\">{{ leanPct }} %<\u002Fdiv>\n                <div style=\"font-size:12px;color:#7fb2bd;margin-top:4px;\">neigen zur Aussage<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:220px;\">\n                <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#7fb2bd;margin-bottom:7px;\"><span>Ø Zustimmung {{ k4avg }} / 5<\u002Fspan><span>1 = gar nicht · 5 = voll<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:6px;align-items:flex-end;height:62px;\">\n                  <sc-for list=\"{{ k4dist }}\" as=\"d\" hint-placeholder-count=\"5\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;\">\n                      <div style=\"width:100%;border-radius:6px 6px 2px 2px;background:{{ d.barColor }};height:{{ d.h }}%;min-height:3px;transition:height 0.5s;\"><\u002Fdiv>\n                      <span style=\"font-size:11px;color:#7fb2bd;\">{{ d.v }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:600;color:#9fd0d8;margin-bottom:10px;\">Begründungen der Gruppe<\u002Fdiv>\n            <sc-if value=\"{{ hasBegs }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n                <sc-for list=\"{{ begs }}\" as=\"b\" hint-placeholder-count=\"6\">\n                  <span style=\"font-size:13px;color:#cfe5ea;background:rgba(3,18,26,0.45);border:1px solid rgba(120,190,205,0.16);border-radius:10px;padding:8px 12px;line-height:1.4;\">„{{ b }}“<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noBegs }}\" hint-placeholder-val=\"\">\n              <div style=\"font-size:13px;color:#7fb2bd;font-style:italic;\">Noch keine Antworten.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- MOTIVATION -->\n          <div style=\"padding:30px 32px;border-radius:20px;background:linear-gradient(160deg,rgba(13,52,66,0.58),rgba(7,30,42,0.7));border:1px solid rgba(120,190,205,0.2);backdrop-filter:blur(14px);margin-bottom:26px;\">\n            <h3 style=\"margin:0 0 22px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:#eef9fa;\">Motivationslage<\u002Fh3>\n            <div style=\"display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:24px;\">\n              <div style=\"flex:none;text-align:center;\">\n                <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:38px;font-weight:700;color:#4fd1c5;line-height:1;\">{{ k6avg }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#7fb2bd;margin-top:4px;\">Ø Interesse / 5<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:220px;\">\n                <div style=\"font-size:13px;color:#a9cdd4;margin-bottom:7px;\">Wie relevant ist Eingangsdiagnostik für den eigenen Unterricht?<\u002Fdiv>\n                <div style=\"display:flex;gap:6px;align-items:flex-end;height:62px;\">\n                  <sc-for list=\"{{ k6dist }}\" as=\"d\" hint-placeholder-count=\"5\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;\">\n                      <div style=\"width:100%;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,#4fd1c5,#2c8fa0);height:{{ d.h }}%;min-height:3px;transition:height 0.5s;\"><\u002Fdiv>\n                      <span style=\"font-size:11px;color:#7fb2bd;\">{{ d.v }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n              <div>\n                <div style=\"font-size:13px;font-weight:600;color:#9fd0d8;margin-bottom:10px;\">Wo wäre so ein Werkzeug am wertvollsten?<\u002Fdiv>\n                <sc-if value=\"{{ hasT7 }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;flex-direction:column;gap:7px;\">\n                    <sc-for list=\"{{ t7s }}\" as=\"t\" hint-placeholder-count=\"4\">\n                      <span style=\"font-size:13px;color:#cfe5ea;line-height:1.45;border-left:2px solid rgba(120,190,205,0.3);padding-left:11px;\">„{{ t }}“<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noT7 }}\" hint-placeholder-val=\"\"><div style=\"font-size:13px;color:#7fb2bd;font-style:italic;\">Noch keine Antworten.<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:13px;font-weight:600;color:#9fd0d8;margin-bottom:10px;\">Was müsste es können?<\u002Fdiv>\n                <sc-if value=\"{{ hasT8 }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;flex-direction:column;gap:7px;\">\n                    <sc-for list=\"{{ t8s }}\" as=\"t\" hint-placeholder-count=\"4\">\n                      <span style=\"font-size:13px;color:#cfe5ea;line-height:1.45;border-left:2px solid rgba(240,185,85,0.4);padding-left:11px;\">„{{ t }}“<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noT8 }}\" hint-placeholder-val=\"\"><div style=\"font-size:13px;color:#7fb2bd;font-style:italic;\">Noch keine Antworten.<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n            <button onclick=\"{{ addSample }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:600;color:#9fd0d8;background:rgba(159,208,216,0.08);border:1px solid rgba(159,208,216,0.3);border-radius:999px;padding:11px 22px;cursor:pointer;transition:all 0.22s;\" style-hover=\"background:rgba(159,208,216,0.16);\">+ Weitere Beispiel-Daten<\u002Fbutton>\n            <button onclick=\"{{ resetData }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:600;color:#7fa9b3;background:none;border:1px solid rgba(120,190,205,0.2);border-radius:999px;padding:11px 22px;cursor:pointer;transition:all 0.22s;\" style-hover=\"color:#ff9e8a;border-color:rgba(255,158,138,0.4);\">Daten zurücksetzen<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== DONE ===== -->\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"\">\n      <section style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 24px 80px;\">\n        <div style=\"max-width:560px;width:100%;text-align:center;animation:ap-rise 0.7s ease both;\">\n          <div style=\"width:84px;height:84px;margin:0 auto 28px;border-radius:50%;background:radial-gradient(circle at 50% 40%,rgba(240,185,85,0.3),rgba(240,185,85,0.06));display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(240,185,85,0.4);\">\n            <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\"><path d=\"M11 21l6 6 13-15\" stroke=\"#f0b955\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h2 style=\"margin:0 0 14px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,5.5vw,52px);color:#f1fafb;\">Geschafft – danke!<\u002Fh2>\n          <p style=\"margin:0 auto 38px;max-width:440px;font-size:16px;line-height:1.7;color:#bcdce2;\">Ihre Antworten wurden anonym gespeichert. Sie müssen nichts weiter tun – Ihre Lehrkraft sieht nun das Bild der ganzen Gruppe.<\u002Fp>\n          <button onclick=\"{{ goHome }}\" style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:600;color:#9fd0d8;background:none;border:1px solid rgba(159,208,216,0.4);border-radius:999px;padding:13px 30px;cursor:pointer;transition:all 0.25s;\" style-hover=\"background:rgba(159,208,216,0.12);color:#d6eef2;\">← Zur Startseite<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.scrollRef = React.createRef();\n    this.boatRef = React.createRef();\n    this.glowRef = React.createRef();\n    this.waveBackRef = React.createRef();\n    this.waveMidRef = React.createRef();\n    this.waveFrontRef = React.createRef();\n    this.DEMO = 'SEMINAR';\n    this.questions = [{ id:'q1', phase:'Vorwissen', kicker:'Was wissen Sie schon?', type:'choice', text:'Was sind „Präkonzepte“ im Sinne der Lehr-Lern-Forschung?', options:['Vorunterrichtliche, oft alltagsgeprägte Vorstellungen, die vom Fachkonzept abweichen können.','Das Vorwissen, das in der letzten Klassenarbeit abgefragt wurde.','Die Lernziele, die vor der Stunde formuliert werden.'], correct:0 },{ id:'q2', phase:'Vorwissen', kicker:'Was wissen Sie schon?', type:'choice', text:'Warum gilt die Einteilung in „Lerntypen“ (visuell, auditiv, kinästhetisch) heute als überholt?', options:['Ihre Wirksamkeit ist empirisch nicht belegt (Pashler et al., 2008).','Sie ist im Unterricht zu aufwändig zu erheben.','Sie gilt nur für die Grundschule.'], correct:0 },{ id:'q3', phase:'Vorwissen', kicker:'Was wissen Sie schon?', type:'choice', text:'Wozu dient eine Eingangsdiagnose vor einer Unterrichtseinheit in erster Linie?', options:['Um den Unterricht an den tatsächlichen Lernstand der Gruppe anzupassen.','Um die Schülerinnen und Schüler zu benoten.','Um Stoff zu legitimieren, der ohnehin behandelt wird.'], correct:0 },{ id:'q4', phase:'Prä-Konzept', kicker:'Wie sehen Sie das?', type:'likert', text:'Wie stark stimmen Sie dieser Aussage zu?', statement:'„Das Vorwissen und die Fehlvorstellungen meiner Lerngruppe kann ich als Lehrkraft aus dem Bauch heraus gut genug einschätzen.“', low:'stimme gar nicht zu', high:'stimme voll zu' },{ id:'q5', phase:'Prä-Konzept', kicker:'Wie sehen Sie das?', type:'open', text:'Woran machen Sie diese Einschätzung fest?', placeholder:'Ihre Begründung …', optional:true },{ id:'q6', phase:'Motivation', kicker:'Was passt zu Ihnen?', type:'scale', text:'Wie relevant ist eine systematische Eingangsdiagnostik für Ihren eigenen Unterricht?', low:'gar nicht', high:'sehr' },{ id:'q7', phase:'Motivation', kicker:'Was passt zu Ihnen?', type:'open', text:'In welcher konkreten Situation Ihres Unterrichts wäre ein solches Diagnose-Werkzeug für Sie am wertvollsten?', placeholder:'Beschreiben Sie kurz eine Situation.', optional:true },{ id:'q8', phase:'Motivation', kicker:'Was passt zu Ihnen?', type:'open', text:'Was müsste ein solches Werkzeug können, damit Sie es tatsächlich einsetzen würden?', placeholder:'Ihre Idee …', optional:true }];\n    this.begPool = ['Nach ein paar Wochen kenne ich meine Klasse eigentlich ganz gut.','Ehrlich gesagt überschätze ich das vermutlich manchmal.','Bei Fehlvorstellungen trügt das Bauchgefühl oft.','Bei neuen Klassen liege ich da regelmäßig daneben.','Kommt stark aufs Thema an.'];\n    this.t7Pool = ['Zu Beginn einer neuen Unterrichtsreihe.','Bei einer sehr heterogenen Lerngruppe.','Vor einem abstrakten, schwierigen Thema.','Wenn ich eine Klasse neu übernehme.'];\n    this.t8Pool = ['Schnell einsetzbar, ohne viel Vorbereitung.','Wirklich anonym, damit ehrlich geantwortet wird.','Auswertung auf einen Blick.','Direkt anschlussfähig an meine Planung.'];\n    this.state = {\n      screen:'home', code:'', codeErr:'', teacherAuthed:false,\n      qIndex:0, answers:{},\n      submissions: this.makeSeed(24)\n    };\n  }\n\n  // ---- sample data ----\n  pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }\n  wpick(weights){ const r=Math.random(); let a=0; for(let i=0;i<weights.length;i++){ a+=weights[i]; if(r<=a) return i; } return weights.length-1; }\n  makeSubmission(){\n    const correct = this.wpick([0.18,0.34,0.30,0.18]); // 0..3 correct\n    const score = correct*2;\n    const k4 = 1 + this.wpick([0.30,0.24,0.18,0.16,0.12]); // skewed low\n    const k6 = 1 + this.wpick([0.10,0.22,0.34,0.22,0.12]);\n    const maybe = (pool,p)=> Math.random()<p ? this.pick(pool) : '';\n    return { score, lvl:this.levelOf(score), k4, k6,\n      beg: maybe(this.begPool,0.62), t7: maybe(this.t7Pool,0.58), t8: maybe(this.t8Pool,0.66) };\n  }\n  makeSeed(n){ const a=[]; for(let i=0;i<n;i++) a.push(this.makeSubmission()); return a; }\n  levelOf(score){ return score>=5 ? 'Vertiefung' : score>=3 ? 'Hauptweg' : 'Einstieg'; }\n\n  // ---- animation ----\n  componentDidMount(){\n    this.t=0; this.target={x:0,y:0}; this.cur={x:0,y:0}; this.sY=0; this.curSY=0;\n    this._onMove=(e)=>{ this.target.x=(e.clientX/window.innerWidth-0.5)*2; this.target.y=(e.clientY/window.innerHeight-0.5)*2; };\n    window.addEventListener('mousemove',this._onMove,{passive:true});\n    const sc=this.scrollRef.current;\n    this._onScroll=()=>{ this.sY = this.scrollRef.current ? this.scrollRef.current.scrollTop : 0; };\n    if(sc) sc.addEventListener('scroll',this._onScroll,{passive:true});\n    const loop=()=>{\n      this.t+=0.016;\n      this.cur.x += (this.target.x-this.cur.x)*0.05;\n      this.cur.y += (this.target.y-this.cur.y)*0.05;\n      this.curSY += (this.sY-this.curSY)*0.09;\n      const t=this.t, mx=this.cur.x, my=this.cur.y, sy=this.curSY;\n      const b=this.boatRef.current;\n      if(b){ const bob=Math.sin(t*1.05)*9; const rot=Math.sin(t*0.85)*1.7 + mx*3.2; b.style.transform='translate('+(mx*54)+'px,'+(bob - sy*0.12)+'px) rotate('+rot+'deg)'; }\n      const g=this.glowRef.current; if(g) g.style.transform='translate('+(mx*-30)+'px,'+(my*-14 + sy*0.16)+'px)';\n      const wb=this.waveBackRef.current; if(wb) wb.style.transform='translate('+(mx*-10)+'px,'+(sy*0.20)+'px)';\n      const wm=this.waveMidRef.current; if(wm) wm.style.transform='translate('+(mx*-18)+'px,'+(sy*0.11)+'px)';\n      const wf=this.waveFrontRef.current; if(wf) wf.style.transform='translate('+(mx*-26)+'px,'+(-sy*0.05)+'px)';\n      this._raf=requestAnimationFrame(loop);\n    };\n    this._raf=requestAnimationFrame(loop);\n  }\n  componentWillUnmount(){ cancelAnimationFrame(this._raf); window.removeEventListener('mousemove',this._onMove); }\n\n  scrollTop(){ const sc=this.scrollRef.current; if(sc) sc.scrollTo({top:0,behavior:'auto'}); }\n\n  // ---- navigation ----\n  go(screen){ this.setState({screen}, ()=>this.scrollTop()); }\n  goHome(){ this.go('home'); }\n  goTeacher(){ if(!this.state.teacherAuthed){ var c=window.prompt('Zugangscode für den Lehrkraft-Bereich:'); if(c===null) return; if((c||'').trim()!=='123'){ window.alert('Falscher Code.'); return; } this.setState({teacherAuthed:true}); } this.go('teacher'); }\n  goClassboard(){ this.go('classboard'); }\n\n  onCodeInput(e){ this.setState({code:e.target.value.toUpperCase(), codeErr:''}); }\n  submitCode(e){\n    if(e&&e.preventDefault) e.preventDefault();\n    const c=(this.state.code||'').trim().toUpperCase();\n    if(!c){ this.setState({codeErr:'Bitte geben Sie einen Code ein.'}); return; }\n    if(c!==this.DEMO){ this.setState({codeErr:'Unbekannter Code. Für die Demo: SEMINAR.'}); return; }\n    this.setState({screen:'intro'}, ()=>this.scrollTop());\n  }\n  startQuiz(){ this.setState({screen:'quiz', qIndex:0, answers:{}}, ()=>this.scrollTop()); }\n\n  // ---- quiz answering ----\n  setAnswer(id,val){ this.setState(s=>({answers:{...s.answers,[id]:val}})); }\n  nextQ(){\n    const i=this.state.qIndex;\n    if(i>=this.questions.length-1){ this.finishQuiz(); return; }\n    this.setState({qIndex:i+1}, ()=>this.scrollTop());\n  }\n  prevQ(){ if(this.state.qIndex>0) this.setState(s=>({qIndex:s.qIndex-1}), ()=>this.scrollTop()); }\n  finishQuiz(){\n    const a=this.state.answers;\n    let correct=0; this.questions.forEach(q=>{ if(q.type==='choice' && a[q.id]===q.correct) correct++; });\n    const score=correct*2;\n    const sub={ score, lvl:this.levelOf(score),\n      k4: a.q4||0, k6: a.q6||0, beg:(a.q5||'').trim(), t7:(a.q7||'').trim(), t8:(a.q8||'').trim() };\n    this.setState(s=>({submissions:[...s.submissions, sub], screen:'done'}), ()=>this.scrollTop());\n  }\n\n  // ---- teacher data ----\n  addSample(){ this.setState(s=>({submissions:[...s.submissions, ...this.makeSeed(6)]})); }\n  resetData(){ this.setState({submissions:[]}); }\n\n  renderVals(){\n    const s=this.state;\n    const subs=s.submissions;\n    const n=subs.length;\n    const q=this.questions[s.qIndex];\n    const ans=s.answers[q.id];\n    // can advance\n    let canNext=true;\n    if(q.type==='choice') canNext = ans!==undefined && ans!==null;\n    if(q.type==='likert'||q.type==='scale') canNext = !!ans;\n    const isLast = s.qIndex===this.questions.length-1;\n    // option list with selection state + computed styles\n    const opts=(q.options||[]).map((text,i)=>{\n      const sel = ans===i;\n      return { text, idx:i, selected:sel, sel:()=>this.setAnswer(q.id,i),\n        bg: sel?'rgba(240,185,85,0.12)':'rgba(3,18,26,0.4)',\n        border: sel?'1.5px solid rgba(240,185,85,0.7)':'1.5px solid rgba(120,190,205,0.18)',\n        color: sel?'#fbf3e2':'#cfe5ea',\n        dot: sel?'#f0b955':'rgba(120,190,205,0.5)',\n        tick: sel?'●':'' };\n    });\n    const scaleVals=[1,2,3,4,5].map(v=>{\n      const sel = ans===v;\n      return { v, selected:sel, sel:()=>this.setAnswer(q.id,v),\n        bg: sel?'#f0b955':'rgba(3,18,26,0.4)',\n        border: sel?'1.5px solid #f0b955':'1.5px solid rgba(120,190,205,0.22)',\n        color: sel?'#04121b':'#cfe5ea' };\n    });\n\n    // ----- classboard aggregation -----\n    const mean=(arr)=> arr.length? arr.reduce((a,b)=>a+b,0)/arr.length : 0;\n    const scores=subs.map(x=>x.score);\n    const avgScore=mean(scores);\n    const lv=(name)=>subs.filter(x=>x.lvl===name).length;\n    const levels=['Einstieg','Hauptweg','Vertiefung'].map(name=>{\n      const c=lv(name); return {name, count:c, pct: n? Math.round(c/n*100):0,\n        desc: name==='Einstieg'?'Grundlagen sichern':name==='Hauptweg'?'auf Kurs':'bereit für mehr'};\n    });\n    const k4arr=subs.map(x=>x.k4).filter(Boolean);\n    const k4avg=mean(k4arr);\n    const lean=subs.filter(x=>x.k4>=4).length;\n    const leanPct=n?Math.round(lean/n*100):0;\n    const k4counts=[1,2,3,4,5].map(v=>subs.filter(x=>x.k4===v).length);\n    const k4max=Math.max(1,...k4counts);\n    const k4dist=[1,2,3,4,5].map((v,i)=>({v,count:k4counts[i],h: Math.round(k4counts[i]/k4max*100), barColor: v>=4?'linear-gradient(180deg,#f0b955,#d99a3c)':'linear-gradient(180deg,#3f8a98,#2c6f7c)'}));\n    const k6arr=subs.map(x=>x.k6).filter(Boolean);\n    const k6avg=mean(k6arr);\n    const k6counts=[1,2,3,4,5].map(v=>subs.filter(x=>x.k6===v).length);\n    const k6max=Math.max(1,...k6counts);\n    const k6dist=[1,2,3,4,5].map((v,i)=>({v,count:k6counts[i],h: Math.round(k6counts[i]/k6max*100)}));\n    const begs=subs.map(x=>x.beg).filter(Boolean);\n    const t7s=subs.map(x=>x.t7).filter(Boolean);\n    const t8s=subs.map(x=>x.t8).filter(Boolean);\n\n    return {\n      scrollRef:this.scrollRef, boatRef:this.boatRef, glowRef:this.glowRef,\n      waveBackRef:this.waveBackRef, waveMidRef:this.waveMidRef, waveFrontRef:this.waveFrontRef,\n      screen:s.screen,\n      isHome:s.screen==='home', isIntro:s.screen==='intro', isQuiz:s.screen==='quiz',\n      isDone:s.screen==='done', isTeacher:s.screen==='teacher', isBoard:s.screen==='classboard',\n      goHome:()=>this.goHome(), goTeacher:()=>this.goTeacher(), goClassboard:()=>this.goClassboard(),\n      code:s.code, codeErr:s.codeErr, onCodeInput:(e)=>this.onCodeInput(e), submitCode:(e)=>this.submitCode(e),\n      startQuiz:()=>this.startQuiz(),\n      // quiz\n      q, qIndex:s.qIndex, qNum:s.qIndex+1, total:this.questions.length,\n      progress: Math.round((s.qIndex+1)/this.questions.length*100),\n      isChoice:q.type==='choice', isLikert:q.type==='likert', isScale:q.type==='scale', isOpen:q.type==='open',\n      isRating:q.type==='likert'||q.type==='scale',\n      opts, scaleVals, openVal: ans||'',\n      onOpenInput:(e)=>this.setAnswer(q.id, e.target.value),\n      canNext, isLast, nextLabel:isLast?'Abschließen':'Weiter →',\n      next:()=>this.nextQ(), prev:()=>this.prevQ(),\n      navPrevDisabled: s.qIndex===0,\n      prevColor: s.qIndex===0?'rgba(127,178,189,0.35)':'#9fd0d8',\n      prevCursor: s.qIndex===0?'default':'pointer',\n      nextDisabled: !canNext,\n      nextTextColor: canNext?'#04121b':'rgba(4,18,27,0.5)',\n      nextBg: canNext?'#f0b955':'rgba(120,190,205,0.18)',\n      nextCursor: canNext?'pointer':'not-allowed',\n      nextShadow: canNext?'0 14px 34px -14px rgba(240,185,85,0.6)':'none',\n      // teacher\n      n, avgScore:avgScore.toFixed(1), levels,\n      k4avg:k4avg.toFixed(1), leanPct, k4dist, statement:this.questions[3].statement,\n      k6avg:k6avg.toFixed(1), k6dist,\n      begs, t7s, t8s,\n      hasBegs:begs.length>0, hasT7:t7s.length>0, hasT8:t8s.length>0,\n      noBegs:begs.length===0, noT7:t7s.length===0, noT8:t8s.length===0,\n      addSample:()=>this.addSample(), resetData:()=>this.resetData(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
